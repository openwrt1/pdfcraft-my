services:
  web-dev:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    profiles:
      - dev

  web:
    # 这里的 image 会优先使用环境变量，如果没有则使用你 GitHub 上的默认镜像
    image: ${IMAGE:-ghcr.io/openwrt1/pdfcraft-my:latest}
    container_name: pdfcraft
    restart: always
    ports:
      - "8080:80"
    profiles:
      - prod

volumes:
  node_modules:
