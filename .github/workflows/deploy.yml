name: Deploy Docker to Tencent Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert IMAGE_NAME to lowercase (Docker requirement)
        run: |
          echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Convert IMAGE_NAME to lowercase
        run: |
          echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Deploy to Tencent Cloud via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.actor }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ubuntu
          key: ${{ secrets.TENCENT_SSH_KEY }}
          envs: GH_TOKEN,USERNAME,IMAGE
          script: |
            cd /home/ubuntu/
            
            # 登录 GitHub 镜像库 (如果是私有库则必须登录才能 Pull)
            echo $GH_TOKEN | docker login ghcr.io -u $USERNAME --password-stdin
            
            # 下载(拉取)最新编译的镜像
            docker pull $IMAGE
            
            # 停止并清理掉正在运行的旧容器
            docker stop pdfcraft || true
            docker rm pdfcraft || true
            
            # 运行新容器，暴露在 8080 端口
            docker run -d -p 8080:80 --name pdfcraft --restart always $IMAGE
            
            # 清除旧版本的悬空镜像，释放服务器磁盘空间
            docker image prune -f
