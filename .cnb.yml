# .cnb.yml - CNB 自动构建与推送流水线
main:
  push:
    - services:
        - docker
      env:
        # 以下三个变量需要在 CNB 项目设置 -> 环境变量 中进行配置
        TCR_USERNAME: $TCR_USERNAME
        TCR_PASSWORD: $TCR_PASSWORD
        # 替换为你自己在腾讯云的镜像仓库地址，例如 ccr.ccs.tencentyun.com/my-namespace/pdfcraft
        IMAGE_NAME: $IMAGE_NAME
      stages:
        - name: 登录腾讯云镜像仓库
          image: docker
          script:
            - echo "$TCR_PASSWORD" | docker login ccr.ccs.tencentyun.com --username "$TCR_USERNAME" --password-stdin
        
        - name: 构建并推送 Docker 镜像
          image: docker
          script:
            # 使用 CNB 内置环境变量获取 git 短哈希作为 tag
            - docker build -t ${IMAGE_NAME}:${CNB_COMMIT_SHORT} -t ${IMAGE_NAME}:latest .
            - docker push ${IMAGE_NAME}:${CNB_COMMIT_SHORT}
            - docker push ${IMAGE_NAME}:latest